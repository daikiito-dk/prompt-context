
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompts Library | P&C</title>
    <link rel="stylesheet" href="../style.css"> </head>
<body class="sub-page">
    <nav>
        <div class="logo"><a href="../index.html" style="color:white; text-decoration:none;">P&C</a></div>
        <ul>
            <li><a href="index.html">Prompts</a></li>
            <li><a href="../contexts/index.html">Contexts</a></li>
            <li><a href="../tools/index.html">Tools</a></li>
        </ul>
    </nav>

    <main class="content-wrapper">
        <header class="sub-header">
            <span class="tag">LIBRARY</span>
            <h1>Prompt Engineering Assets</h1>
            <p>高品質なプロンプトをワンクリックでコピー。</p>
        </header>

        <section class="prompt-item">
            <div class="prompt-header">
                <h3>深層思考・推論プロンプト</h3>
                <button class="copy-btn" onclick="copyPrompt('prompt1')">Copy</button>
            </div>
            <pre id="prompt1" class="code-block">
あなたは世界最高のエンジニアです。
以下の制約条件に基づき、論理的な思考ステップを経て回答してください。
# 制約条件:
- 結論から述べること
- 中間プロセスを簡潔に書くこと...
            </pre>
        </section>

        <section class="prompt-item">
            <div class="prompt-header">
                <h3>要約・構造化プロンプト</h3>
                <button class="copy-btn" onclick="copyPrompt('prompt2')">Copy</button>
            </div>
            <pre id="prompt2" class="code-block">
以下の文章を、箇条書きで3点に要約してください。
また、最も重要なキーワードを1つ抽出してください。
            </pre>
        </section>
    </main>

    <script>
        function copyPrompt(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.innerText = 'Copied!';
                btn.style.background = '#00ffcc';
                setTimeout(() => {
                    btn.innerText = 'Copy';
                    btn.style.background = '';
                }, 2000);
            });
        }
    </script>
</body>
</html>
